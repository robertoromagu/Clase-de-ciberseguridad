<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo - Mini Tienda</title>
  
  <!-- Pico.css CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  
  <!-- Estilos personalizados (si tienes custom.css) -->
  <link rel="stylesheet" href="/css/custom.css">
  
  <style>
    .product-card {
      border: 1px solid var(--pico-border-color);
      border-radius: var(--pico-border-radius);
      padding: 1rem;
      margin-bottom: 1.5rem;
      background: var(--pico-card-background-color);
    }
    .product-price {
      font-size: 1.4rem;
      font-weight: bold;
      color: var(--pico-color-green-700);
    }
    .product-seller {
      font-size: 0.9rem;
      color: var(--pico-color-grey-600);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    #loading {
      text-align: center;
      padding: 3rem 0;
      color: var(--pico-color-grey-600);
    }
  </style>
</head>

<body>

  <header class="container-fluid">
    <nav class="container">
      <ul>
        <li><strong>Mini Tienda</strong></li>
      </ul>
      <ul id="nav-user">
        <!-- Se rellena dinámicamente con JS -->
      </ul>
    </nav>
  </header>

  <main class="container">
    <h1>Catálogo de productos</h1>
    
    <p id="status-message" style="display: none;"></p>
    
    <div id="loading">Cargando productos...</div>
    
    <div id="products-grid" class="grid" style="display: none;"></div>
    
    <p style="text-align: center; margin-top: 2rem;">
      ¿Quieres vender algo? <a href="/sell">Publica tu producto aquí</a>
    </p>
  </main>

  <script src="/js/api.js"></script>
  <script>
    // ────────────────────────────────────────────────
    // Cargar catálogo al iniciar la página
    // ────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
      // Verificar estado de autenticación y actualizar navbar
      await checkAuthStatus();

      const grid = document.getElementById('products-grid');
      const loading = document.getElementById('loading');
      const status = document.getElementById('status-message');

      try {
        const products = await apiFetch('/api/products');

        loading.style.display = 'none';
        grid.style.display = 'grid';

        if (products.length === 0) {
          status.textContent = 'No hay productos disponibles en este momento.';
          status.style.display = 'block';
          status.className = 'secondary';
          return;
        }

        products.forEach(product => {
          const card = document.createElement('article');
          card.className = 'product-card';

          card.innerHTML = `
            <h3>${escapeHTML(product.name)}</h3>
            <p>${escapeHTML(product.description.substring(0, 120))}${product.description.length > 120 ? '...' : ''}</p>
            <div class="product-price">${product.price} €</div>
            <div class="product-seller">Vendedor: ${escapeHTML(product.seller)}</div>
            <small>${new Date(product.created_at).toLocaleDateString('es-ES')}</small>
            <br><br>
            <button class="secondary outline" 
                    onclick="addToCart('${product.id}')">
              Añadir al carrito
            </button>
          `;

          grid.appendChild(card);
        });
      } catch (err) {
        loading.style.display = 'none';
        status.textContent = 'No se pudieron cargar los productos: ' + err.message;
        status.style.display = 'block';
        status.className = 'error';
        console.error(err);
      }
    });

    // ────────────────────────────────────────────────
    // Función placeholder para añadir al carrito
    // (la implementaremos completamente más adelante)
    // ────────────────────────────────────────────────
    async function addToCart(productId) {
  try {
    const auth = await checkAuthStatus();
    if (!auth) {
      alert('Debes iniciar sesión para añadir productos');
      window.location.href = '/login';
      return;
    }

    await addToCart(productId);  // ← ahora usa la función del api.js
    alert('¡Producto añadido al carrito!');
    
    // Opcional: actualizar contador en navbar si lo tienes
    // updateCartCount();
  } catch (err) {
    alert('Error: ' + err.message);
  }
}

        // Placeholder: más adelante haremos POST real a /api/cart/add
        alert(`Producto ${productId} añadido al carrito (simulado)`);
        
        // Versión futura (descomentar cuando tengamos la ruta):
        /*
        await apiFetch('/api/cart/add', {
          method: 'POST',
          body: JSON.stringify({ productId })
        });
        alert('¡Añadido al carrito!');
        */
      

    // Pequeña función para escapar HTML y evitar XSS básico
    function escapeHTML(str) {
      return str.replace(/[&<>"']/g, function(m) {
        return {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[m];
      });
    }
  </script>
</body>
</html>
